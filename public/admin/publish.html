<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Publish a review — Movies with Avi</title>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,800&family=Spline+Sans+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root { --red:#C0392E; --dark:#1B1214; --cream:#F6EFE4; --ink:#2A1E1B; --soft:#6B5A52; --butter:#F2B838; }
* { box-sizing: border-box; margin: 0; }
body { background: var(--cream); color: var(--ink); font: 16px/1.5 "Bricolage Grotesque", sans-serif; padding: 22px 16px 80px; }
.wrap { max-width: 560px; margin: 0 auto; }
h1 { font-size: 1.6rem; font-weight: 800; letter-spacing: -.01em; }
h1 span { color: var(--red); }
.sub { color: var(--soft); margin: 4px 0 20px; font-size: .95rem; }
label { display: block; font-weight: 600; font-size: .82rem; letter-spacing: .04em; text-transform: uppercase; color: var(--soft); margin: 16px 0 5px; }
label em { text-transform: none; letter-spacing: 0; font-style: normal; font-weight: 400; }
input[type=text], textarea {
  width: 100%; padding: 12px 13px; border-radius: 10px; font: inherit;
  border: 2px solid rgba(42,30,27,.18); background: #fff; color: var(--ink);
}
input:focus, textarea:focus { outline: none; border-color: var(--red); }
textarea { resize: vertical; }
#deets { min-height: 200px; font-size: 16px; }
.row { display: flex; gap: 10px; }
.row > div { flex: 1; }
.stars { display: flex; align-items: center; gap: 6px; margin-top: 2px; }
.stars input[type=range] { flex: 1; accent-color: var(--red); }
.stars .val { font: 600 1.05rem "Spline Sans Mono"; min-width: 64px; text-align: right; }
.slugline { font: .78rem "Spline Sans Mono"; color: var(--soft); margin-top: 5px; word-break: break-all; }
.poster { margin-top: 6px; border: 2px dashed rgba(42,30,27,.25); border-radius: 12px; padding: 14px; text-align: center; background: #fff; }
.poster img { max-width: 160px; max-height: 220px; border-radius: 8px; display: block; margin: 0 auto 10px; box-shadow: 0 4px 14px rgba(27,18,20,.25); }
.poster .hint { color: var(--soft); font-size: .85rem; }
button { background: var(--red); color: #fff; border: none; border-radius: 10px; padding: 13px 20px; font: 700 1rem "Bricolage Grotesque", sans-serif; cursor: pointer; }
button:disabled { opacity: .55; }
button.ghost { background: #fff; color: var(--ink); border: 2px solid rgba(42,30,27,.2); font-weight: 600; }
.actions { display: flex; gap: 10px; margin-top: 26px; }
.actions button { flex: 1; }
.gate { max-width: 380px; margin: 60px auto; text-align: center; }
.gate input { width: 100%; padding: 12px 14px; border-radius: 10px; border: 2px solid rgba(42,30,27,.2); font: inherit; margin: 14px 0 10px; }
.msg { margin-top: 16px; padding: 13px 15px; border-radius: 10px; font-weight: 600; display: none; }
.msg.ok { display: block; background: #e8f3e4; color: #2c5e26; }
.msg.err { display: block; background: #fbe4e0; color: var(--red); }
.msg a { color: inherit; }
.marquee { background: var(--dark); color: var(--cream); border-radius: 12px; padding: 10px 14px; font: 600 .8rem "Spline Sans Mono"; letter-spacing: .05em; margin-bottom: 18px; }
.marquee b { color: var(--butter); }
@media (max-width: 480px) { .row { flex-direction: column; gap: 0; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Now <span>publishing</span></h1>
  <p class="sub">Fill the ticket, attach the poster, and it's on the site in about two minutes.</p>

  <div class="gate" id="gate">
    <p>Enter the admin key to open the booth.</p>
    <input id="key" type="password" placeholder="Admin key" autocomplete="current-password" />
    <button id="go">Open the booth</button>
    <p class="msg err" id="gate-err"></p>
  </div>

  <form id="form" style="display:none" onsubmit="return false">
    <div class="marquee">NEW REVIEW · <b id="m-title">Untitled</b></div>

    <label for="title">Movie title</label>
    <input type="text" id="title" placeholder="e.g. Miroirs No. 3" autocomplete="off" required />
    <div class="slugline" id="slugline"></div>

    <div class="row">
      <div>
        <label for="rating">Rating <em>(out of 4, e.g. 3.65)</em></label>
        <input type="text" id="rating" inputmode="decimal" placeholder="3.65" autocomplete="off" />
      </div>
      <div>
        <label for="ratingText">Rating description</label>
        <input type="text" id="ratingText" placeholder="A must-see film" />
      </div>
    </div>

    <label for="oneLine">One-line summary</label>
    <input type="text" id="oneLine" placeholder="The hook, in one sentence." required />

    <label for="deets">The Deets</label>
    <textarea id="deets" placeholder="The full review. Plain text or Markdown — paragraphs, **bold**, whatever you like." required></textarea>

    <label for="perfectFor">Perfect for</label>
    <input type="text" id="perfectFor" placeholder="A rainy Sunday when you want..." />

    <div class="row">
      <div>
        <label for="whereToWatch">Where to watch</label>
        <input type="text" id="whereToWatch" placeholder="Netflix" />
      </div>
      <div>
        <label for="foodPairing">Food pairing</label>
        <input type="text" id="foodPairing" placeholder="Buttered popcorn and..." />
      </div>
    </div>

    <label for="categories">Categories <em>(comma-separated)</em></label>
    <input type="text" id="categories" placeholder="Drama, Foreign" />

    <label for="tags">Tags <em>(comma-separated)</em></label>
    <input type="text" id="tags" placeholder="slow burn, hidden gem, french" />

    <label>Poster</label>
    <div class="poster" id="poster-box">
      <img id="poster-preview" style="display:none" alt="" />
      <div class="hint" id="poster-hint">Tap to add the poster from your camera roll</div>
      <input type="file" id="poster" accept="image/*" style="display:none" />
    </div>

    <div class="actions">
      <button class="ghost" id="draft-btn" type="button">Save as draft</button>
      <button id="publish-btn" type="button">Publish</button>
    </div>
    <p class="msg" id="msg"></p>
  </form>
</div>

<script>
const $ = id => document.getElementById(id);
let KEY = sessionStorage.getItem('avi-admin-key') || '';
let posterData = null, posterExt = 'jpg';

const slugify = t => t.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '')
  .replace(/&/g, ' and ').replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '');

function refresh() {
  const t = $('title').value.trim();
  $('m-title').textContent = t || 'Untitled';
  $('slugline').textContent = t ? `→ src/content/reviews/${slugify(t)}.md` : '';
}
$('title').addEventListener('input', refresh);

// ---- gate (reuses the projection-booth key) ----
async function tryKey() {
  const r = await fetch(`/api/stats?key=${encodeURIComponent(KEY)}&days=7`);
  if (!r.ok) { sessionStorage.removeItem('avi-admin-key'); return false; }
  $('gate').style.display = 'none'; $('form').style.display = '';
  return true;
}
$('go').onclick = async () => {
  KEY = $('key').value.trim();
  if (await tryKey()) sessionStorage.setItem('avi-admin-key', KEY);
  else $('gate-err').textContent = 'Wrong key.';
};
$('key').addEventListener('keydown', e => { if (e.key === 'Enter') $('go').click(); });
if (KEY) tryKey();

// ---- poster: pick, downscale on-device, preview ----
$('poster-box').onclick = () => $('poster').click();
$('poster').addEventListener('change', () => {
  const f = $('poster').files[0];
  if (!f) return;
  const img = new Image();
  img.onload = () => {
    const MAX = 1400;
    const scale = Math.min(1, MAX / Math.max(img.width, img.height));
    const c = document.createElement('canvas');
    c.width = Math.round(img.width * scale);
    c.height = Math.round(img.height * scale);
    c.getContext('2d').drawImage(img, 0, 0, c.width, c.height);
    posterData = c.toDataURL('image/jpeg', 0.85).split(',')[1];
    posterExt = 'jpg';
    $('poster-preview').src = 'data:image/jpeg;base64,' + posterData;
    $('poster-preview').style.display = '';
    $('poster-hint').textContent = 'Tap to swap the poster';
    URL.revokeObjectURL(img.src);
  };
  img.src = URL.createObjectURL(f);
});

// ---- publish ----
async function submit(asDraft) {
  const title = $('title').value.trim();
  const msg = $('msg');
  msg.className = 'msg';
  if (!title) return showErr('The movie needs a title.');
  if (!asDraft) {
    if (!$('oneLine').value.trim()) return showErr('Add the one-line summary.');
    if (!$('deets').value.trim()) return showErr('The Deets are empty.');
    if (!posterData) return showErr('Add a poster before publishing (drafts can skip it).');
  }

  const ratingRaw = $('rating').value.trim().replace(',', '.');
  let num = null;
  if (ratingRaw) {
    num = parseFloat(ratingRaw);
    if (!Number.isFinite(num) || num < 0 || num > 4) return showErr('Rating should be a number between 0 and 4, like 3.65.');
    num = Math.round(num * 100) / 100;
  }
  if (num === null && !asDraft) return showErr('Add a rating before publishing.');
  const body = {
    key: KEY,
    draft: asDraft,
    slug: slugify(title),
    title,
    date: new Date().toISOString().slice(0, 10),
    rating: num === null ? '' : `${num}/4`,
    ratingNum: num,
    ratingText: $('ratingText').value.trim(),
    oneLine: $('oneLine').value.trim(),
    perfectFor: $('perfectFor').value.trim(),
    whereToWatch: $('whereToWatch').value.trim(),
    foodPairing: $('foodPairing').value.trim(),
    categories: $('categories').value.split(',').map(s => s.trim()).filter(Boolean),
    tags: $('tags').value.split(',').map(s => s.trim()).filter(Boolean),
    deets: $('deets').value.trim(),
    posterBase64: posterData,
    posterExt
  };

  $('publish-btn').disabled = $('draft-btn').disabled = true;
  $('publish-btn').textContent = asDraft ? 'Publish' : 'Publishing…';
  try {
    const r = await fetch('/api/publish', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    const d = await r.json().catch(() => ({}));
    if (!r.ok) throw new Error(d.error || `Publish failed (${r.status}).`);
    msg.className = 'msg ok';
    msg.innerHTML = asDraft
      ? `Draft saved to <b>drafts/${body.slug}.md</b>. Move it into src/content/reviews/ when it's ready.`
      : `<b>${title}</b> is on its way — Railway is rebuilding now. Give it ~2 minutes, then check <a href="/reviews/${body.slug}/">/reviews/${body.slug}/</a>.`;
    if (!asDraft) window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
  } catch (e) {
    showErr(e.message);
  } finally {
    $('publish-btn').disabled = $('draft-btn').disabled = false;
    $('publish-btn').textContent = 'Publish';
  }
}
function showErr(t) { const m = $('msg'); m.className = 'msg err'; m.textContent = t; }
$('publish-btn').onclick = () => submit(false);
$('draft-btn').onclick = () => submit(true);
</script>
</body>
</html>
